services:
  postgres:
    image: postgres:16
    container_name: batch-postgres
    environment:
      POSTGRES_USER: batch
      POSTGRES_PASSWORD: batch
      POSTGRES_DB: batch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U batch"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: batch-api
    depends_on:
      postgres:
        condition: service_healthy
    # Reads LLM_API_KEY / LLM_MODEL / tuning knobs from .env. DATABASE_URL is
    # overridden below so the container reaches Postgres via the compose network.
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://batch:batch@postgres:5432/batch
      STORAGE_LOCAL_ROOT: /app/data/results
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./sample_batch.json:/app/sample_batch.json:ro

  # Optional observability stack. OFF by default — start with:
  #   docker compose --profile observability up -d
  # Then: Prometheus http://localhost:9090, Grafana http://localhost:3000
  prometheus:
    image: prom/prometheus:latest
    container_name: batch-prometheus
    profiles: ["observability"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: batch-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # Optional: local S3-compatible storage to test the "s3" backend before
  # wiring real DigitalOcean Spaces. Enable with `docker compose --profile s3 up`.
  minio:
    image: minio/minio
    container_name: batch-minio
    profiles: ["s3"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
  promdata:
  grafanadata:
