name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-unit:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Unit tests
        run: pytest -m "not integration" --cov=app --cov-report=term-missing

  integration:
    name: Integration tests (Postgres + 1 live call)
    runs-on: ubuntu-latest
    needs: lint-and-unit
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: batch
          POSTGRES_PASSWORD: batch
          POSTGRES_DB: batch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U batch"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://batch:batch@localhost:5432/batch
      STORAGE_LOCAL_ROOT: ./data/results
      LLM_BASE_URL: https://inference.do-ai.run/v1/
      # Optional secrets. When LLM_API_KEY is unset, the single live-inference
      # test self-skips and the DB integration tests still run.
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_MODEL: ${{ secrets.LLM_MODEL || 'mistral-3-14B' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Apply database migrations
        run: alembic upgrade head
      - name: Run integration tests
        # DB tests always run; exactly one real inference call runs only if the
        # LLM_API_KEY secret is configured (keeps token usage negligible).
        run: pytest -m integration -v

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t batch-processing-system:${{ github.sha }} .
      # To publish, add a registry login + push here (e.g. GHCR):
      #   - uses: docker/login-action@v3
      #   - run: docker push ...
